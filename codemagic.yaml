workflows:
  ios-workflow:
    name: iOS Flutter Build
    max_build_duration: 60

    environment:
      flutter: stable

    scripts:
      - name: Install dependencies
        script: flutter pub get

      - name: Prepare iOS
        script: flutter precache --ios

      - name: Build IPA (no codesign)
        script: flutter build ipa --release --no-codesign

    artifacts:
      - build/ios/ipa/*.ipa